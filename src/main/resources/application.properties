spring.application.name=CallCenter
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# Carga opcionalmente un archivo .env local (ignorado por Git) con DATABASE_URL.
spring.config.import=optional:file:.env[.properties]

# Configura Neon con variables de entorno o con un archivo .env local.
# Puedes pegar directamente la cadena JDBC Java de Neon en DATABASE_URL:
# DATABASE_URL=jdbc:postgresql://HOST/neondb?user=USUARIO&password=PASSWORD&sslmode=require&channelBinding=require
#
# Si solo quieres probar la página sin Neon:
# ./mvnw spring-boot:run -Dspring-boot.run.profiles=local
# .\mvnw.cmd spring-boot:run -D"spring-boot.run.profiles=local"
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.sql.init.mode=always
spring.sql.init.continue-on-error=false
