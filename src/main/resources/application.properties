spring.application.name=CallCenter
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# Configura la conexión con Neon usando variables de entorno para no guardar secretos en Git.
# Ejemplo local:
# export DATABASE_URL="jdbc:postgresql://HOST/neondb?sslmode=require"
# export DATABASE_USERNAME="neondb_owner"
# export DATABASE_PASSWORD="tu_password"
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.sql.init.mode=always
spring.sql.init.continue-on-error=false
