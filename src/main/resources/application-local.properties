# Perfil local para ejecutar la aplicación sin depender de una base Neon/PostgreSQL externa.
# Uso en PowerShell: .\mvnw.cmd spring-boot:run -D"spring-boot.run.profiles=local"
# Uso en Bash: ./mvnw spring-boot:run -Dspring-boot.run.profiles=local
spring.datasource.url=jdbc:h2:mem:callcenter;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.sql.init.mode=always
